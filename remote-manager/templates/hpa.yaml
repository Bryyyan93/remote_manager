{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "remote-manager.fullname" . }}
  labels:
    {{- include "remote-manager.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "remote-manager.fullname" . }}

  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}

  # Métricas: define CPU y/o memoria si están configuradas
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}

  {{- if or .Values.autoscaling.behavior.scaleUp .Values.autoscaling.behavior.scaleDown }}
  behavior:
    {{- with .Values.autoscaling.behavior.scaleUp }}
    scaleUp:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.autoscaling.behavior.scaleDown }}
    scaleDown:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
