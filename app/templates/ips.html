{% extends "base.html" %}
{% block title %}IPs por tag{% endblock %}

{% block body %}
  <h1 style="margin-bottom:1rem;">IPs por tag</h1>

  {% if error %}
  <div class="error" style="margin-bottom:1rem;">{{ error }}</div>
  {% endif %}

  <div class="card" style="margin-bottom:1rem;">
    <div class="toolbar">
      <label for="tag" class="muted">Tag</label>
      <select id="tag" name="tag" class="input">
        {% for t in tags %}
          <option value="{{ t }}">{{ t }}</option>
        {% endfor %}
      </select>

      <!-- Botón “Ver datos”: hace GET a /ui/ips/_list?tag=.... y pinta el parcial -->
      <button
        class="btn primary"
        hx-get="/ui/ips/_list"
        hx-target="#resultado"
        hx-indicator="#cargando"
        hx-include="#tag"
      >
        Ver datos
      </button>

      <!-- Botón “Volver”: limpia resultados -->
      <button class="btn ghost" onclick="document.querySelector('#resultado').innerHTML=''">Volver</button>

      <span id="cargando" class="muted" style="display:none" hx-ext="class-tools">Cargando…</span>
    </div>
  </div>

  <div id="resultado" class="card">
    <p class="muted">Selecciona un tag y pulsa “Ver datos”.</p>
  </div>
{% endblock %}
