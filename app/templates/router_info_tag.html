{% extends "base.html" %}
{% block title %}Informacion por tag{% endblock %}

{% block body %}
  <h1 style="margin-bottom:1rem;">Informacion por tag</h1>

  {% if error %}
  <div class="error" style="margin-bottom:1rem;">{{ error }}</div>
  {% endif %}

  <div class="card" style="margin-bottom:1rem;">
    <div class="toolbar">
      <label for="tag" class="muted">Tag</label>
      <select id="tag" name="tag" class="input">
        {% for t in tags %}
          <option value="{{ t }}">{{ t }}</option>
        {% endfor %}
      </select>

      <button
        id="btn-ver-datos"
        class="btn primary"
        hx-get="/ui/info_tag/_tabla"
        hx-target="#resultado"
        hx-indicator="#cargando"
        hx-include="#tag"
        hx-on::before-request="this.disabled=true; document.getElementById('resultado').innerHTML='<p class=&quot;muted&quot;>Cargando datos...</p>';"
        hx-on::after-request="this.disabled=false"
        hx-on::response-error="this.disabled=false"
      >
        Ver datos
      </button>

      <button class="btn ghost" onclick="document.querySelector('#resultado').innerHTML=''">Volver</button>

      <span id="cargando" class="htmx-indicator">
        <span class="loading-dot"></span> Cargando...
      </span>
    </div>
  </div>

  <div id="resultado" class="card">
    <p class="muted">Selecciona un tag y pulsa "Ver datos".</p>
  </div>
{% endblock %}
