<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Consumos{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- HTMX (CDN) -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Estilos sencillos (modo oscuro) -->
  <style>
    :root { color-scheme: dark; }
    html, body { background:#0b0f14; color:#e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    a { color:#93c5fd; }
    .container { max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
    .card { background:#0f172a; border:1px solid #1f2937; border-radius:12px; padding:1rem; box-shadow: 0 4px 16px rgba(0,0,0,.35); }
    .btn { display:inline-block; padding:.55rem .9rem; border-radius:.6rem; border:1px solid #334155; background:#111827; color:#e5e7eb; text-decoration:none; cursor:pointer; }
    .btn:hover { background:#0b1324; }
    .btn.primary { border-color:#2563eb; }
    .btn.ghost { background:transparent; }
    .muted { color:#94a3b8; }
    .input, select { background:#0b1320; color:#e5e7eb; border:1px solid #334155; border-radius:.6rem; padding:.5rem .6rem; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:.5rem .6rem; border-bottom:1px solid #1f2937; }
    th { text-align:left; color:#cbd5e1; font-weight:600; }
    .error { color:#fca5a5; background:#450a0a; border:1px solid #7f1d1d; padding:.6rem .8rem; border-radius:.6rem; }
    .toolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full">
  <div class="container">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
