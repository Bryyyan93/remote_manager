<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Consumos{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- HTMX (CDN) -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- Estilos sencillos (modo oscuro) -->
  <style>
    :root { color-scheme: dark; }
    html, body { background:#0b0f14; color:#e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    a { color:#93c5fd; }
    .container { max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
    .card { background:#0f172a; border:1px solid #1f2937; border-radius:12px; padding:1rem; box-shadow: 0 4px 16px rgba(0,0,0,.35); }
    .btn { display:inline-block; padding:.55rem .9rem; border-radius:.6rem; border:1px solid #334155; background:#111827; color:#e5e7eb; text-decoration:none; cursor:pointer; }
    .btn:hover { background:#0b1324; }
    .btn.primary { border-color:#2563eb; }
    .btn.ghost { background:transparent; }
    .muted { color:#94a3b8; }
    .input, select { background:#0b1320; color:#e5e7eb; border:1px solid #334155; border-radius:.6rem; padding:.5rem .6rem; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:.5rem .6rem; border-bottom:1px solid #1f2937; }
    th { text-align:left; color:#cbd5e1; font-weight:600; }
    .error { color:#fca5a5; background:#450a0a; border:1px solid #7f1d1d; padding:.6rem .8rem; border-radius:.6rem; }
    .toolbar { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
    .htmx-indicator { display:none; }
    .htmx-indicator.htmx-request { display:inline-flex; align-items:center; gap:.45rem; color:#93c5fd; }
    .loading-dot {
      width:.5rem; height:.5rem; border-radius:999px; background:#60a5fa; display:inline-block;
      animation:pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }

    /* Colores para limites*/
    .badge{display:inline-block;padding:.15rem .45rem;border-radius:.45rem;border:1px solid transparent}
    .badge.ok{background:#052e16;border-color:#14532d;color:#86efac}          /* Límite no alcanzado = verde */
    .badge.near{background:#3a1d06;border-color:#a16207;color:#fcd34d}       /* Límite cercano = ámbar */
    .badge.warn{background:#451a03;border-color:#92400e;color:#fcd34d}       /* Límite alcanzado = amarillo */
    .badge.danger{background:#450a0a;border-color:#7f1d1d;color:#fecaca}     /* Límite superado = rojo */

    /* Colores Estado de conexion*/
    .status{display:inline-block;padding:.15rem .45rem;border-radius:.45rem;border:1px solid transparent}
    .status.on{background:#052e16;border-radius:.4rem;color:#86efac}
    .status.off{background:#450a0a;border-radius:.4rem;color:#fecaca}
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full">
  <div class="container">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
